  <!-- Legend -->
  <rect x="70" y="1160" width="1660" height="96" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text class="legend" x="105" y="1195">读图方式：实线表示主业务依赖，虚线表示证据、指标、事件或展示引用。业务对象通过 EventRecord 产生自动化触发，AgentRun 不直接越权改数据，而是输出结构化动作，经规则和权限提交。</text>
  <text class="legend" x="105" y="1228">建模约束：ExecutionGraph 是执行时快照；FPGA/EMU 节点必须关联资源请求或租约；FailureIssue 关闭必须有 CloseGateEvaluation；每条规则运行时只创建一个 AgentRun。</text>
