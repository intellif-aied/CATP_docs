<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260" role="img" aria-labelledby="title desc">
  <title id="title">资源管理与调度二级架构</title>
  <desc id="desc">面向 FPGA、EMU、CPU、QEMU 等资源的管理与调度二级架构，突出优先级、人机共享、昼夜策略、独占租约和可中断调度。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .page { fill: url(#bg); }
      .title { font: 700 36px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .section { fill: #ffffff; stroke-width: 1.5; filter: url(#shadow); }
      .section-title { font: 700 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .section-subtitle { font: 400 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: rgba(255,255,255,0.88); }
      .card { fill: #ffffff; stroke-width: 1.3; }
      .card-title { font: 700 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .card-text { font: 400 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .chip { font: 700 12px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 7; }
      .lane-label { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .note { font: 400 12px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1260"/>
  <text class="title" x="70" y="58">资源管理与调度二级架构</text>
  <text class="subtitle" x="70" y="90">核心约束：FPGA / EMU 不可虚拟化，默认独占租约；资源同时服务人和程序；白天优先人，夜间优先程序；中断必须保护现场。</text>

  <!-- Request sources -->
  <rect class="section" x="55" y="130" width="360" height="870" rx="22" stroke="#6366f1"/>
  <rect x="80" y="156" width="170" height="72" rx="18" fill="#4f46e5"/>
  <text class="section-title" x="104" y="187">请求入口</text>
  <text class="section-subtitle" x="104" y="211">人 / 程序 / 外部事件</text>

  <rect class="card" x="85" y="260" width="285" height="102" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="112" y="292">人工资源申请</text>
  <text class="card-text" x="112" y="319">调试、复现、保留现场、专项验证</text>
  <text class="card-text" x="112" y="342">白天默认高于普通程序任务</text>

  <rect class="card" x="85" y="390" width="285" height="102" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="112" y="422">程序执行请求</text>
  <text class="card-text" x="112" y="449">回归计划、夜间计划、CI 触发</text>
  <text class="card-text" x="112" y="472">夜间自动填充空闲资源</text>

  <rect class="card" x="85" y="520" width="285" height="102" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="112" y="552">外部事件触发</text>
  <text class="card-text" x="112" y="579">PR、版本发布、资源心跳、故障告警</text>
  <text class="card-text" x="112" y="602">转换为调度请求或资源事件</text>

  <rect class="card" x="85" y="650" width="285" height="126" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="112" y="682">请求标准化</text>
  <text class="card-text" x="112" y="709">consumer_type：human / program</text>
  <text class="card-text" x="112" y="732">priority：P0 - P4</text>
  <text class="card-text" x="112" y="755">interruptibility：none / drain / checkpoint</text>

  <rect class="card" x="85" y="805" width="285" height="126" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="112" y="837">人工保护机制</text>
  <text class="card-text" x="112" y="864">租约到期提醒、手动续约</text>
  <text class="card-text" x="112" y="887">现场保留、owner 确认</text>
  <text class="card-text" x="112" y="910">超时释放也要留审计</text>

  <!-- Scheduling core -->
  <rect class="section" x="455" y="130" width="890" height="870" rx="22" stroke="#16a34a"/>
  <rect x="480" y="156" width="245" height="72" rx="18" fill="#15803d"/>
  <text class="section-title" x="504" y="187">调度核心</text>
  <text class="section-subtitle" x="504" y="211">策略 / 队列 / 租约 / 中断</text>

  <rect class="card" x="500" y="260" width="365" height="120" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="528" y="292">优先级与策略引擎</text>
  <text class="card-text" x="528" y="319">P0 紧急、P1 投片阻塞、P2 高风险</text>
  <text class="card-text" x="528" y="342">白天 human boost，夜间 program boost</text>
  <text class="card-text" x="528" y="365">等待老化、资源稀缺、版本匹配加权</text>

  <rect class="card" x="910" y="260" width="365" height="120" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="938" y="292">昼夜窗口策略</text>
  <text class="card-text" x="938" y="319">工作时段：人优先，程序可 drain</text>
  <text class="card-text" x="938" y="342">夜间时段：程序优先填充空闲资源</text>
  <text class="card-text" x="938" y="365">P0 / 预约 / 审批可跨窗口覆盖</text>

  <rect class="card" x="500" y="410" width="365" height="120" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="528" y="442">多队列调度</text>
  <text class="card-text" x="528" y="469">human_queue / program_queue / debug_queue</text>
  <text class="card-text" x="528" y="492">按资源类型、项目、优先级分片</text>
  <text class="card-text" x="528" y="515">避免低价值任务长期占用稀缺资源</text>

  <rect class="card" x="910" y="410" width="365" height="120" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="938" y="442">独占租约管理器</text>
  <text class="card-text" x="938" y="469">FPGA / EMU 默认 exclusive lease</text>
  <text class="card-text" x="938" y="492">租约绑定 owner、任务、资源、有效期</text>
  <text class="card-text" x="938" y="515">支持续约、释放、过期、审计</text>

  <rect class="card" x="500" y="560" width="365" height="128" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="528" y="592">资源匹配与评分</text>
  <text class="card-text" x="528" y="619">能力矩阵：芯片 / 平台 / 版本 / debug</text>
  <text class="card-text" x="528" y="642">亲和性：真实硬件、trace、速度、稳定性</text>
  <text class="card-text" x="528" y="665">过滤 unhealthy / reserved / incompatible</text>

  <rect class="card" x="910" y="560" width="365" height="128" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="938" y="592">中断与抢占控制器</text>
  <text class="card-text" x="938" y="619">drain：到检查点后释放</text>
  <text class="card-text" x="938" y="642">checkpoint：保存现场后迁移/恢复</text>
  <text class="card-text" x="938" y="665">force：仅 P0 + 审批 + 现场保护</text>

  <rect class="card" x="500" y="718" width="365" height="126" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="528" y="750">预约与日历</text>
  <text class="card-text" x="528" y="777">人工调试预约、专项验证窗口</text>
  <text class="card-text" x="528" y="800">夜间批量回归窗口</text>
  <text class="card-text" x="528" y="823">冲突检测、审批、自动提醒</text>

  <rect class="card" x="910" y="718" width="365" height="126" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="938" y="750">调度决策记录</text>
  <text class="card-text" x="938" y="777">为什么选该资源</text>
  <text class="card-text" x="938" y="800">为什么抢占/不中断</text>
  <text class="card-text" x="938" y="823">输入快照、分数、规则命中</text>

  <!-- Resource operation -->
  <rect class="section" x="1385" y="130" width="360" height="870" rx="22" stroke="#ea580c"/>
  <rect x="1410" y="156" width="205" height="72" rx="18" fill="#c2410c"/>
  <text class="section-title" x="1434" y="187">资源执行面</text>
  <text class="section-subtitle" x="1434" y="211">适配 / 健康 / 现场</text>

  <rect class="card" x="1420" y="260" width="285" height="102" rx="14" stroke="#ea580c"/>
  <text class="card-title" x="1447" y="292">资源注册与能力矩阵</text>
  <text class="card-text" x="1447" y="319">类型、芯片版本、软件版本</text>
  <text class="card-text" x="1447" y="342">debug 能力、trace、稳定性、速度</text>

  <rect class="card" x="1420" y="390" width="285" height="102" rx="14" stroke="#ea580c"/>
  <text class="card-title" x="1447" y="422">心跳与健康检查</text>
  <text class="card-text" x="1447" y="449">online、temperature、disk、board 状态</text>
  <text class="card-text" x="1447" y="472">unhealthy 自动隔离</text>

  <rect class="card" x="1420" y="520" width="285" height="102" rx="14" stroke="#ea580c"/>
  <text class="card-title" x="1447" y="552">执行适配器</text>
  <text class="card-text" x="1447" y="579">FPGA / EMU / CPU / QEMU Adapter</text>
  <text class="card-text" x="1447" y="602">部署、启动、暂停、恢复、清理</text>

  <rect class="card" x="1420" y="650" width="285" height="126" rx="14" stroke="#ea580c"/>
  <text class="card-title" x="1447" y="682">Checkpoint 与现场保护</text>
  <text class="card-text" x="1447" y="709">保存版本、参数、进度、日志</text>
  <text class="card-text" x="1447" y="732">失败现场禁止覆盖</text>
  <text class="card-text" x="1447" y="755">生成恢复点与复现包</text>

  <rect class="card" x="1420" y="805" width="285" height="126" rx="14" stroke="#ea580c"/>
  <text class="card-title" x="1447" y="837">资源池</text>
  <text class="card-text" x="1447" y="864">FPGA、EMU：独占，不虚拟化</text>
  <text class="card-text" x="1447" y="887">CPU、QEMU：可批量并发</text>
  <text class="card-text" x="1447" y="910">资源单位统一抽象 ResourceUnit</text>

  <!-- Bottom governance -->
  <rect class="section" x="55" y="1040" width="1690" height="135" rx="22" stroke="#0f766e"/>
  <rect x="80" y="1063" width="225" height="88" rx="18" fill="#0f766e"/>
  <text class="section-title" x="104" y="1098">治理与观测</text>
  <text class="section-subtitle" x="104" y="1124">指标 / 审计 / 告警 / 解释</text>

  <rect class="card" x="345" y="1063" width="285" height="88" rx="14" stroke="#0f766e"/>
  <text class="card-title" x="372" y="1094">调度指标</text>
  <text class="card-text" x="372" y="1121">资源利用率、等待时间、中断次数</text>

  <rect class="card" x="660" y="1063" width="285" height="88" rx="14" stroke="#0f766e"/>
  <text class="card-title" x="687" y="1094">人机公平性</text>
  <text class="card-text" x="687" y="1121">白天人优先、夜间程序填充、饥饿保护</text>

  <rect class="card" x="975" y="1063" width="285" height="88" rx="14" stroke="#0f766e"/>
  <text class="card-title" x="1002" y="1094">审计与解释</text>
  <text class="card-text" x="1002" y="1121">租约、抢占、暂停、释放全部留理由</text>

  <rect class="card" x="1290" y="1063" width="285" height="88" rx="14" stroke="#0f766e"/>
  <text class="card-title" x="1317" y="1094">通知与审批</text>
  <text class="card-text" x="1317" y="1121">租约到期、抢占申请、P0 覆盖、异常隔离</text>

  <!-- Arrows -->
  <path class="arrow" d="M 370 312 C 430 312 440 312 495 312"/>
  <path class="arrow" d="M 370 442 C 430 442 440 442 495 442"/>
  <path class="arrow" d="M 370 572 C 430 572 440 572 495 572"/>
  <path class="arrow" d="M 865 320 C 890 320 885 320 905 320"/>
  <path class="arrow" d="M 683 380 L 683 405"/>
  <path class="arrow" d="M 1093 380 L 1093 405"/>
  <path class="arrow" d="M 865 470 C 890 470 885 470 905 470"/>
  <path class="arrow" d="M 683 530 L 683 555"/>
  <path class="arrow" d="M 1093 530 L 1093 555"/>
  <path class="arrow" d="M 865 624 C 890 624 885 624 905 624"/>
  <path class="arrow" d="M 1275 624 C 1335 624 1345 624 1415 574"/>
  <path class="arrow" d="M 1275 470 C 1335 470 1345 470 1415 442"/>
  <path class="arrow" d="M 1275 780 C 1335 780 1345 780 1415 845"/>
  <path class="arrow-soft" d="M 1562 362 L 1562 385"/>
  <path class="arrow-soft" d="M 1562 492 L 1562 515"/>
  <path class="arrow-soft" d="M 1562 622 L 1562 645"/>
  <path class="arrow" d="M 900 1000 L 900 1034"/>

  <!-- Policy chips -->
  <rect x="500" y="875" width="190" height="38" rx="19" fill="#16a34a"/>
  <text class="chip" x="528" y="900">Daytime：Human First</text>
  <rect x="710" y="875" width="195" height="38" rx="19" fill="#0ea5e9"/>
  <text class="chip" x="738" y="900">Night：Program Fill</text>
  <rect x="925" y="875" width="205" height="38" rx="19" fill="#f97316"/>
  <text class="chip" x="953" y="900">FPGA / EMU：Exclusive</text>
  <rect x="1150" y="875" width="125" height="38" rx="19" fill="#dc2626"/>
  <text class="chip" x="1183" y="900">P0 Override</text>
</svg>
