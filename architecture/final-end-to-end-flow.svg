<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1330" viewBox="0 0 1800 1330" role="img" aria-labelledby="title desc">
  <title id="title">芯片软件验证自动化平台端到端闭环</title>
  <desc id="desc">从需求、PR、人工计划和里程碑触发，到事件规则、Managed Agent、用例执行、资源调度、失败分析和展示报告的端到端闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .page { fill: url(#bg); }
      .title { font: 700 36px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .lane { fill: #ffffff; stroke-width: 1.5; filter: url(#shadow); }
      .lane-title { font: 700 20px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .lane-subtitle { font: 400 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: rgba(255,255,255,0.90); }
      .card { fill: #ffffff; stroke-width: 1.4; }
      .card-title { font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .card-text { font: 400 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .note { font: 400 12px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 7; }
      .pill { font: 700 12px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .small-title { font: 700 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1330"/>
  <text class="title" x="70" y="58">芯片软件验证自动化平台端到端闭环</text>
  <text class="subtitle" x="70" y="90">核心链路：业务对象变化产生事件，规则 1:1 触发 Agent，执行驱动器定时轮询资源并下发任务，Agent 通过标准动作驱动执行、资源、失败闭环和展示。</text>

  <!-- Lanes -->
  <rect class="lane" x="55" y="132" width="300" height="950" rx="22" stroke="#6366f1"/>
  <rect x="80" y="158" width="190" height="70" rx="18" fill="#4f46e5"/>
  <text class="lane-title" x="104" y="188">触发来源</text>
  <text class="lane-subtitle" x="104" y="211">需求 / PR / 人工计划</text>

  <rect class="lane" x="390" y="132" width="330" height="950" rx="22" stroke="#0ea5e9"/>
  <rect x="415" y="158" width="220" height="70" rx="18" fill="#0284c7"/>
  <text class="lane-title" x="439" y="188">事件规则层</text>
  <text class="lane-subtitle" x="439" y="211">Event / Rule / Workflow</text>

  <rect class="lane" x="755" y="132" width="330" height="950" rx="22" stroke="#14b8a6"/>
  <rect x="780" y="158" width="230" height="70" rx="18" fill="#0f766e"/>
  <text class="lane-title" x="804" y="188">验证业务层</text>
  <text class="lane-subtitle" x="804" y="211">计划 / 用例 DAG / 结果</text>

  <rect class="lane" x="1120" y="132" width="330" height="950" rx="22" stroke="#16a34a"/>
  <rect x="1145" y="158" width="235" height="70" rx="18" fill="#15803d"/>
  <text class="lane-title" x="1169" y="188">执行资源层</text>
  <text class="lane-subtitle" x="1169" y="211">调度 / 租约 / 执行平台</text>

  <rect class="lane" x="1485" y="132" width="260" height="950" rx="22" stroke="#f97316"/>
  <rect x="1510" y="158" width="190" height="70" rx="18" fill="#ea580c"/>
  <text class="lane-title" x="1534" y="188">闭环展示层</text>
  <text class="lane-subtitle" x="1534" y="211">Issue / PR / 看板 / 报告</text>

  <!-- Trigger cards -->
  <rect class="card" x="90" y="270" width="225" height="92" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="116" y="302">需求变更</text>
  <text class="card-text" x="116" y="328">覆盖关系、准入项、风险等级</text>

  <rect class="card" x="90" y="395" width="225" height="92" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="116" y="427">PR / 版本事件</text>
  <text class="card-text" x="116" y="453">diff、build、CI、制品发布</text>

  <rect class="card" x="90" y="520" width="225" height="92" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="116" y="552">人工计划</text>
  <text class="card-text" x="116" y="578">冒烟、夜间、专项定位、复跑</text>

  <rect class="card" x="90" y="645" width="225" height="92" rx="14" stroke="#6366f1"/>
  <text class="card-title" x="116" y="677">里程碑门禁</text>
  <text class="card-text" x="116" y="703">投片准入、风险升级、日报周报</text>

  <!-- Automation cards -->
  <rect class="card" x="430" y="260" width="250" height="102" rx="14" stroke="#0ea5e9"/>
  <text class="card-title" x="458" y="292">EventRecord</text>
  <text class="card-text" x="458" y="319">schema 校验、幂等、trace_id</text>
  <text class="card-text" x="458" y="342">事件存储、回放、死信</text>

  <rect class="card" x="430" y="395" width="250" height="116" rx="14" stroke="#0ea5e9"/>
  <text class="card-title" x="458" y="427">AutomationRule</text>
  <text class="card-text" x="458" y="454">条件匹配、上下文查询</text>
  <text class="card-text" x="458" y="477">命中原因和跳过原因</text>
  <text class="card-text" x="458" y="500">一条规则只绑定一个 Agent</text>

  <rect class="card" x="430" y="545" width="250" height="102" rx="14" stroke="#0ea5e9"/>
  <text class="card-title" x="458" y="577">RuleActivation</text>
  <text class="card-text" x="458" y="604">一次命中生成一次激活</text>
  <text class="card-text" x="458" y="627">运行层 1:1 创建 AgentRun</text>

  <rect class="card" x="430" y="680" width="250" height="126" rx="14" stroke="#0ea5e9"/>
  <text class="card-title" x="458" y="712">Managed AgentRun</text>
  <text class="card-text" x="458" y="739">MCP、Skill、Subagent 可插拔</text>
  <text class="card-text" x="458" y="762">权限、预算、超时、审计</text>
  <text class="card-text" x="458" y="785">输出结构化动作和证据</text>

  <!-- Business cards -->
  <rect class="card" x="795" y="260" width="250" height="102" rx="14" stroke="#14b8a6"/>
  <text class="card-title" x="823" y="292">ExecutionPlan</text>
  <text class="card-text" x="823" y="319">全量、增量、夜间、专项</text>
  <text class="card-text" x="823" y="342">冻结版本矩阵和执行范围</text>

  <rect class="card" x="795" y="395" width="250" height="116" rx="14" stroke="#14b8a6"/>
  <text class="card-title" x="823" y="427">ExecutionGraph</text>
  <text class="card-text" x="823" y="454">按人工平台标注生成 DAG</text>
  <text class="card-text" x="823" y="477">QEMU precheck 可跳过 FPGA/EMU</text>
  <text class="card-text" x="823" y="500">基础 gate 失败阻断下游</text>

  <rect class="card" x="795" y="545" width="250" height="102" rx="14" stroke="#14b8a6"/>
  <text class="card-title" x="823" y="577">CaseExecutionNode</text>
  <text class="card-text" x="823" y="604">节点级状态机</text>
  <text class="card-text" x="823" y="627">READY 后申请对应资源</text>

  <rect class="card" x="795" y="695" width="250" height="126" rx="14" stroke="#14b8a6"/>
  <text class="card-title" x="823" y="727">PlatformExecutionResult</text>
  <text class="card-text" x="823" y="754">pass、fail、skip、blocked</text>
  <text class="card-text" x="823" y="777">artifact_refs、版本矩阵、平台</text>
  <text class="card-text" x="823" y="800">失败产生 FailSnapshot</text>

  <!-- Execution cards -->
  <rect class="card" x="1160" y="260" width="250" height="116" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="1188" y="292">Resource Scheduler</text>
  <text class="card-text" x="1188" y="319">优先级、人机共享、昼夜策略</text>
  <text class="card-text" x="1188" y="342">FPGA / EMU 独占租约</text>
  <text class="card-text" x="1188" y="365">抢占前 drain / checkpoint</text>

  <rect class="card" x="1160" y="410" width="250" height="102" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="1188" y="442">QEMU + Model / CPU</text>
  <text class="card-text" x="1188" y="469">快速预筛、CI、日志分析</text>
  <text class="card-text" x="1188" y="492">高并发、低成本、易复跑</text>

  <rect class="card" x="1160" y="545" width="250" height="102" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="1188" y="577">EMU</text>
  <text class="card-text" x="1188" y="604">复杂状态、trace、可观测定位</text>
  <text class="card-text" x="1188" y="627">稀缺资源，默认独占</text>

  <rect class="card" x="1160" y="680" width="250" height="102" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="1188" y="712">FPGA</text>
  <text class="card-text" x="1188" y="739">真实板卡、长稳、系统级闭环</text>
  <text class="card-text" x="1188" y="762">现场保护和人工审批</text>

  <rect class="card" x="1160" y="815" width="250" height="102" rx="14" stroke="#16a34a"/>
  <text class="card-title" x="1188" y="847">Artifacts</text>
  <text class="card-text" x="1188" y="874">日志、trace、dump、波形、报告</text>
  <text class="card-text" x="1188" y="897">S3 存大文件，SQL 存索引</text>

  <!-- Closure cards -->
  <rect class="card" x="1508" y="260" width="215" height="116" rx="14" stroke="#f97316"/>
  <text class="card-title" x="1532" y="292">Failure Issue</text>
  <text class="card-text" x="1532" y="319">owner、标签、里程碑</text>
  <text class="card-text" x="1532" y="342">timeline、重复、证据</text>
  <text class="card-text" x="1532" y="365">类似 GitHub Issue</text>

  <rect class="card" x="1508" y="410" width="215" height="116" rx="14" stroke="#f97316"/>
  <text class="card-title" x="1532" y="442">Fix / Verification PR</text>
  <text class="card-text" x="1532" y="469">代码、配置、用例修复</text>
  <text class="card-text" x="1532" y="492">QEMU / EMU / FPGA</text>
  <text class="card-text" x="1532" y="515">checks 与关闭门禁</text>

  <rect class="card" x="1508" y="560" width="215" height="116" rx="14" stroke="#f97316"/>
  <text class="card-title" x="1532" y="592">Dashboard</text>
  <text class="card-text" x="1532" y="619">资源、任务、失败、准入</text>
  <text class="card-text" x="1532" y="642">负责人、Owner、资源视图</text>
  <text class="card-text" x="1532" y="665">可解释操作入口</text>

  <rect class="card" x="1508" y="710" width="215" height="116" rx="14" stroke="#f97316"/>
  <text class="card-title" x="1532" y="742">Report / Notify</text>
  <text class="card-text" x="1532" y="769">日报、周报、夜间摘要</text>
  <text class="card-text" x="1532" y="792">投片风险 Top</text>
  <text class="card-text" x="1532" y="815">审批和阻塞升级</text>

  <!-- Main arrows -->
  <path class="arrow" d="M315 316 C355 316 380 311 430 311"/>
  <path class="arrow" d="M315 441 C355 441 380 446 430 446"/>
  <path class="arrow" d="M315 566 C355 566 380 596 430 596"/>
  <path class="arrow" d="M315 691 C355 691 380 742 430 742"/>

  <path class="arrow" d="M680 311 C720 311 745 311 795 311"/>
  <path class="arrow" d="M680 453 C720 453 745 453 795 453"/>
  <path class="arrow" d="M680 596 C720 596 745 596 795 596"/>
  <path class="arrow" d="M680 743 C720 743 745 743 795 743"/>

  <path class="arrow" d="M1045 311 C1085 311 1110 318 1160 318"/>
  <path class="arrow" d="M1045 453 C1085 453 1110 461 1160 461"/>
  <path class="arrow" d="M1045 603 C1085 603 1110 596 1160 596"/>
  <path class="arrow" d="M1045 758 C1085 758 1110 866 1160 866"/>

  <path class="arrow" d="M1410 318 C1450 318 1475 318 1508 318"/>
  <path class="arrow" d="M1410 866 C1460 866 1485 468 1508 468"/>
  <path class="arrow" d="M1410 866 C1460 866 1485 618 1508 618"/>
  <path class="arrow" d="M1410 866 C1460 866 1485 768 1508 768"/>

  <!-- Feedback loops -->
  <path class="arrow-soft" d="M1615 376 C1615 1120 610 1160 555 806"/>
  <text class="note" x="755" y="1155">Issue / PR / 检查结果再次发布事件，触发复跑、验证、报告或关闭门禁</text>

  <path class="arrow-soft" d="M1285 260 C1285 75 525 72 555 260"/>
  <text class="note" x="715" y="118">资源心跳、租约到期、健康变化进入事件总线</text>

  <!-- Bottom protocol strip -->
  <rect x="70" y="1135" width="1660" height="120" rx="20" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text class="small-title" x="105" y="1175">跨模块协议</text>
  <rect x="105" y="1195" width="210" height="34" rx="17" fill="#334155"/>
  <text class="pill" x="131" y="1217">Event Schema</text>
  <rect x="350" y="1195" width="210" height="34" rx="17" fill="#334155"/>
  <text class="pill" x="376" y="1217">Version Matrix</text>
  <rect x="595" y="1195" width="210" height="34" rx="17" fill="#334155"/>
  <text class="pill" x="621" y="1217">Result JSON</text>
  <rect x="840" y="1195" width="210" height="34" rx="17" fill="#334155"/>
  <text class="pill" x="866" y="1217">Resource Lease</text>
  <rect x="1085" y="1195" width="210" height="34" rx="17" fill="#334155"/>
  <text class="pill" x="1111" y="1217">Fail Snapshot</text>
  <rect x="1330" y="1195" width="210" height="34" rx="17" fill="#334155"/>
  <text class="pill" x="1356" y="1217">Agent Output</text>
  <text class="note" x="105" y="1248">这些协议保证自动化动作可追溯、可回放、可解释、可审计。</text>
</svg>
