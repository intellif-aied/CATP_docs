<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">执行驱动器 (Execution Driver) 架构</title>
  <desc id="desc">执行驱动器作为后台确定性组件，监控资源状态并遍历 ExecutionGraph，找到可执行节点后把任务下发到对应资源执行入口。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .page { fill: url(#bg); }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke-width: 1.5; filter: url(#shadow); }
      .box-title { font: 700 20px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .box-subtitle { font: 400 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: rgba(255,255,255,0.88); }
      .card { fill: #ffffff; stroke-width: 1.4; }
      .card-title { font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .card-text { font: 400 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .note { font: 400 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow-blue); }
      .arrow-dash { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 7; }
      .label { font: 700 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .step-num { font: 700 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="70" y="56">执行驱动器 (Execution Driver) 架构</text>
  <text class="subtitle" x="70" y="86">后台确定性组件：监控资源状态 → 遍历执行图 → 得到可执行节点 → 下发任务到对应资源</text>

  <!-- Left: ExecutionGraph -->
  <rect class="box" x="50" y="130" width="420" height="700" rx="22" stroke="#14b8a6"/>
  <rect x="75" y="155" width="200" height="65" rx="16" fill="#0f766e"/>
  <text class="box-title" x="99" y="183">ExecutionGraph</text>
  <text class="box-subtitle" x="99" y="206">平台节点执行图快照</text>

  <rect class="card" x="80" y="255" width="360" height="70" rx="12" stroke="#14b8a6"/>
  <text class="card-title" x="106" y="282">CaseExecutionNode A</text>
  <text class="card-text" x="106" y="304">状态: READY · 平台: QEMU · 依赖已解除</text>

  <rect class="card" x="80" y="345" width="360" height="70" rx="12" stroke="#14b8a6"/>
  <text class="card-title" x="106" y="372">CaseExecutionNode B</text>
  <text class="card-text" x="106" y="394">状态: READY · 平台: EMU · 依赖已解除</text>

  <rect class="card" x="80" y="435" width="360" height="70" rx="12" stroke="#cbd5e1"/>
  <text class="card-title" x="106" y="462" fill="#94a3b8">CaseExecutionNode C</text>
  <text class="card-text" x="106" y="484" fill="#94a3b8">状态: BLOCKED · 等待上游 Node B</text>

  <rect class="card" x="80" y="525" width="360" height="70" rx="12" stroke="#14b8a6"/>
  <text class="card-title" x="106" y="552">CaseExecutionNode D</text>
  <text class="card-text" x="106" y="574">状态: READY · 平台: FPGA · 依赖已解除</text>

  <!-- Center: Execution Driver -->
  <rect class="box" x="510" y="130" width="580" height="700" rx="22" stroke="#2563eb"/>
  <rect x="535" y="155" width="260" height="65" rx="16" fill="#1d4ed8"/>
  <text class="box-title" x="559" y="183">Execution Driver</text>
  <text class="box-subtitle" x="559" y="206">后台定时任务 · 非 Agent</text>

  <rect class="card" x="545" y="255" width="510" height="80" rx="12" stroke="#2563eb"/>
  <circle cx="575" cy="295" r="16" fill="#2563eb"/>
  <text class="step-num" x="570" y="301">1</text>
  <text class="card-title" x="605" y="282">监控资源状态 / 租约事件</text>
  <text class="card-text" x="605" y="306">消费资源调度模块的状态快照、租约确认、拒绝原因</text>
  <text class="card-text" x="605" y="324">不计算优先级、不做抢占策略</text>

  <rect class="card" x="545" y="355" width="510" height="80" rx="12" stroke="#2563eb"/>
  <circle cx="575" cy="395" r="16" fill="#2563eb"/>
  <text class="step-num" x="570" y="401">2</text>
  <text class="card-title" x="605" y="382">遍历 ExecutionGraph</text>
  <text class="card-text" x="605" y="406">扫描 READY 状态的 CaseExecutionNode</text>
  <text class="card-text" x="605" y="424">确认依赖边、平台顺序和 gate 已释放</text>

  <rect class="card" x="545" y="455" width="510" height="80" rx="12" stroke="#2563eb"/>
  <circle cx="575" cy="495" r="16" fill="#2563eb"/>
  <text class="step-num" x="570" y="501">3</text>
  <text class="card-title" x="605" y="482">识别可执行节点</text>
  <text class="card-text" x="605" y="506">匹配节点资源需求与可用资源 / confirmed lease</text>
  <text class="card-text" x="605" y="524">不满足时只记录等待原因和等待时长</text>

  <rect class="card" x="545" y="555" width="510" height="80" rx="12" stroke="#2563eb"/>
  <circle cx="575" cy="595" r="16" fill="#2563eb"/>
  <text class="step-num" x="570" y="601">4</text>
  <text class="card-title" x="605" y="582">下发 ExecutionTask</text>
  <text class="card-text" x="605" y="606">资源 / 租约确认 → 下发到对应资源执行入口</text>
  <text class="card-text" x="605" y="624">执行完成后回写 CaseExecutionNode 状态</text>

  <rect class="card" x="545" y="660" width="510" height="95" rx="12" stroke="#f59e0b"/>
  <text class="card-title" x="575" y="687" fill="#d97706">关键约束</text>
  <text class="card-text" x="575" y="711">· 不选择用例、不分配资源、不执行脚本</text>
  <text class="card-text" x="575" y="731">· 每次下发记录：触发时间、节点 ID、资源/租约来源、幂等键</text>
  <text class="card-text" x="575" y="751">· FPGA / EMU 节点必须经过独占租约确认</text>

  <!-- Right: Resource Scheduler + Execution Agent -->
  <rect class="box" x="1130" y="130" width="420" height="700" rx="22" stroke="#16a34a"/>
  <rect x="1155" y="155" width="220" height="65" rx="16" fill="#15803d"/>
  <text class="box-title" x="1179" y="183">资源调度模块</text>
  <text class="box-subtitle" x="1179" y="206">Resource Scheduler</text>

  <rect class="card" x="1160" y="255" width="360" height="100" rx="12" stroke="#16a34a"/>
  <text class="card-title" x="1186" y="282">ResourceRequest 处理</text>
  <text class="card-text" x="1186" y="306">优先级排序、昼夜策略匹配</text>
  <text class="card-text" x="1186" y="326">FPGA / EMU 独占租约分配</text>
  <text class="card-text" x="1186" y="346">QEMU / CPU 快速填充</text>

  <rect class="card" x="1160" y="380" width="360" height="100" rx="12" stroke="#16a34a"/>
  <text class="card-title" x="1186" y="407">ResourceLease granted</text>
  <text class="card-text" x="1186" y="431">租约确认，返回资源单元</text>
  <text class="card-text" x="1186" y="451">记录调度决策理由</text>
  <text class="card-text" x="1186" y="471">通知执行驱动器</text>

  <rect class="box" x="1160" y="520" width="360" height="130" rx="18" stroke="#f97316" fill="#fff7ed"/>
  <rect x="1180" y="540" width="170" height="50" rx="14" fill="#ea580c"/>
  <text class="box-title" x="1204" y="560" font-size="16">执行 Agent</text>
  <text class="box-subtitle" x="1204" y="578" font-size="11">Execution Agent</text>
  <text class="card-text" x="1186" y="618">部署环境、拉取版本矩阵</text>
  <text class="card-text" x="1186" y="638">执行用例、采集 Result JSON 和 artifacts</text>

  <rect class="card" x="1160" y="680" width="360" height="80" rx="12" stroke="#ef4444"/>
  <text class="card-title" x="1186" y="707" fill="#dc2626">资源不可用</text>
  <text class="card-text" x="1186" y="731">返回拒绝原因 → 执行驱动器记录等待</text>
  <text class="card-text" x="1186" y="751">下次轮询重新评估</text>

  <!-- Arrows -->
  <path class="arrow-blue" d="M 440 290 C 480 290 500 290 545 290"/>
  <text class="label" x="462" y="280">遍历 READY 节点</text>

  <path class="arrow-blue" d="M 1055 495 C 1095 495 1115 305 1160 305"/>
  <text class="label" x="1082" y="390">请求/读取资源状态</text>

  <path class="arrow-dash" d="M 1160 430 C 1120 430 1100 530 1055 530"/>
  <text class="label" x="1078" y="488">资源状态 / Lease 结果</text>

  <path class="arrow-blue" d="M 1055 595 C 1095 595 1115 585 1160 585"/>
  <text class="label" x="1082" y="580">下发任务</text>

  <path class="arrow-dash" d="M 1160 585 C 1120 585 500 585 480 585 C 460 585 460 500 440 500"/>
  <text class="label" x="800" y="570">结果回写 CaseExecutionNode</text>

  <!-- Legend -->
  <rect x="70" y="850" width="1460" height="35" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="note" x="100" y="873">实线箭头 = 主动调用</text>
  <text class="note" x="350" y="873">虚线箭头 = 回调 / 回写</text>
  <text class="note" x="600" y="873">蓝色 = 执行驱动器核心链路</text>
  <text class="note" x="900" y="873">执行驱动器不是 Agent，不决定资源策略，是资源监控 + 图遍历 + 下发组件</text>
</svg>
